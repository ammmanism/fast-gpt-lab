# Training Configuration — GPT-2 Small (124M)
# Run: uv run python -m src.vanilla.train --config configs/gpt2_small.yaml

model:
  n_layer: 12
  n_head: 12
  n_embd: 768
  block_size: 1024
  vocab_size: 50304
  mlp_variant: swiglu   # SwiGLU for performance
  dropout: 0.0
  bias: false

training:
  dataset: openwebtext
  data_dir: data/

  # Batch — effective batch size = batch_size × grad_accum_steps × block_size
  # = 12 × 40 × 1024 ≈ 491,520 tokens/step
  batch_size: 12
  grad_accum_steps: 40

  # Optimizer
  learning_rate: 6.0e-4
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0

  # LR Schedule (cosine decay)
  warmup_steps: 2000
  max_steps: 600000
  lr_decay_steps: 600000
  min_lr: 6.0e-5

  # Evaluation
  eval_interval: 2000
  eval_steps: 200
  log_interval: 10

  # System
  device: cuda
  dtype: bfloat16
  compile: true        # ~30% speedup via torch.compile

  # Checkpointing
  out_dir: checkpoints/gpt2_small/
  checkpoint_interval: 5000

  # Logging
  wandb: false
  wandb_project: fast-gpt-lab
  wandb_run_name: gpt2-small-124M-swiglu
